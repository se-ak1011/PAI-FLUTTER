name: pai
description: Personal Assistant for Trades (PAI) - A marketplace connecting tradespeople with customers, featuring AI quoting and tax management.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # Core State Management & Navigation
  flutter_riverpod: ^3.3.2
  go_router: ^17.3.0
  
  # Backend: Supabase
  supabase_flutter: ^2.15.0
  
  # Networking & Utilities
  http: ^1.2.0
  json_annotation: ^4.8.1
  intl: ^0.20.2
  uuid: ^4.3.3
  
  # UI Components & Icons
  material_design_icons_flutter: ^7.0.7296
  flutter_spinkit: ^5.2.0
  cached_network_image: ^3.4.1
  qr_flutter: ^4.1.0
  share_plus: ^13.1.0
  percent_indicator: ^4.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true

  # The app uses a set of custom assets for onboarding and marketplace visuals
  # assets:
  #   - assets/images/logo.png
  #   - assets/images/placeholder_avatar.png

  # Specific font configuration can be added here if needed by the app_theme.dart
  # fonts:
  #   - family: BrandFont
  #     fonts:
  #       - asset: assets/fonts/BrandFont-Regular.ttf
  #       - asset: assets/fonts/BrandFont-Bold.ttf
  #         weight: 700
