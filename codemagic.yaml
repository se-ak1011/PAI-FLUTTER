workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
         distribution_type: app_store
         bundle_identifier: com.paii.app
    cache:
      cache_paths:
        - $HOME/.pub-cache
    scripts:
      - name: Enable Swift Package Manager for Flutter iOS plugins
        script: flutter config --enable-swift-package-manager

      - name: Install Flutter dependencies
        script: flutter pub get

      - name: Set up code signing
        script: |
           keychain initialize
           app-store-connect fetch-signing-files com.paii.app --type IOS_APP_STORE --create
           keychain add-certificates
           xcode-project use-profiles

      - name: Remove CocoaPods artifacts if present
        script: |
          cd ios
          if command -v pod >/dev/null 2>&1; then
            pod deintegrate || true
          fi
          rm -rf Pods Podfile.lock

      - name: Validate xcconfig no longer includes Pods
        script: |
          ! grep -q 'Pods/Target Support Files/Pods-Runner/Pods-Runner.debug.xcconfig' ios/Flutter/Debug.xcconfig
          ! grep -q 'Pods/Target Support Files/Pods-Runner/Pods-Runner.release.xcconfig' ios/Flutter/Release.xcconfig

      - name: Build iOS ipa
        script: flutter build ipa --release
    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/iphoneos/Runner.app.dSYM.zip
      - /tmp/xcodebuild_logs/*.log
