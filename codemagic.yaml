workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
          - Ios_signing
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        IOS_BUNDLE_IDENTIFIER: com.paii.app
      ios_signing:
         distribution_type: app_store
         bundle_identifier: $IOS_BUNDLE_IDENTIFIER
    cache:
      cache_paths:
        - $HOME/.pub-cache
    scripts:
      - name: Print iOS signing assets detected by Codemagic
        script: |
          echo "== Code signing identities (name + SHA-1) =="
          security find-identity -v -p codesigning || true

          echo ""
          echo "== Provisioning profiles available =="
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          if [[ -d "$PROFILE_DIR" ]]; then
            find "$PROFILE_DIR" -name "*.mobileprovision" -maxdepth 1 | while read -r profile; do
              echo ""
              echo "Profile file: $(basename "$profile")"
              security cms -D -i "$profile" > /tmp/codemagic_profile.plist
              /usr/libexec/PlistBuddy -c "Print :Name" /tmp/codemagic_profile.plist || true
              /usr/libexec/PlistBuddy -c "Print :UUID" /tmp/codemagic_profile.plist || true
              /usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" /tmp/codemagic_profile.plist || true
            done
          else
            echo "No provisioning profiles directory found at $PROFILE_DIR"
          fi

      - name: Validate bundle identifier matches Xcode project
        script: |
          XCODE_APP_BUNDLE_ID=$(grep -E 'PRODUCT_BUNDLE_IDENTIFIER = ' ios/Runner.xcodeproj/project.pbxproj | grep -v 'RunnerTests' | head -n 1 | sed -E 's/.*= ([^;]+);/\1/')
          echo "Codemagic ios_signing.bundle_identifier: $IOS_BUNDLE_IDENTIFIER"
          echo "Xcode Runner PRODUCT_BUNDLE_IDENTIFIER: $XCODE_APP_BUNDLE_ID"

          if [[ -z "$XCODE_APP_BUNDLE_ID" ]]; then
            echo "Could not read PRODUCT_BUNDLE_IDENTIFIER from ios/Runner.xcodeproj/project.pbxproj"
            exit 1
          fi

          if [[ "$XCODE_APP_BUNDLE_ID" != "$IOS_BUNDLE_IDENTIFIER" ]]; then
            echo "Bundle identifier mismatch. Align codemagic.yaml and Xcode before building."
            exit 1
          fi

      - name: Install Flutter dependencies
        script: flutter pub get

      - name: Validate App Store Connect secrets
        script: |
          set -eo pipefail
          export APP_STORE_CONNECT_KEY_IDENTIFIER="${APP_STORE_CONNECT_KEY_IDENTIFIER:-${APP_STORE_CONNECT_KEY_ID:-}}"

          REQUIRED_VARS=(
            APP_STORE_CONNECT_KEY_IDENTIFIER
            APP_STORE_CONNECT_ISSUER_ID
            APP_STORE_CONNECT_PRIVATE_KEY
            IOS_BUNDLE_IDENTIFIER
          )

          for VAR_NAME in "${REQUIRED_VARS[@]}"; do
            if [[ -z "${!VAR_NAME:-}" ]]; then
              echo "ERROR: Missing required Codemagic secret: $VAR_NAME"
              exit 1
            fi
          done

          echo "All required App Store Connect secrets are present."

      - name: Set up code signing
        script: |
          set -eo pipefail
          export APP_STORE_CONNECT_KEY_IDENTIFIER="${APP_STORE_CONNECT_KEY_IDENTIFIER:-${APP_STORE_CONNECT_KEY_ID:-}}"
          keychain initialize
          app-store-connect fetch-signing-files "$IOS_BUNDLE_IDENTIFIER" --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Verify code signing setup
        script: |
          echo "== CM_EXPORT_OPTIONS_PLIST value =="
          echo "${CM_EXPORT_OPTIONS_PLIST:-<empty – xcode-project use-profiles did not set it>}"

          if [[ -n "$CM_EXPORT_OPTIONS_PLIST" && -f "$CM_EXPORT_OPTIONS_PLIST" ]]; then
            echo ""
            echo "== ExportOptions.plist contents =="
            cat "$CM_EXPORT_OPTIONS_PLIST"
          else
            echo "WARNING: CM_EXPORT_OPTIONS_PLIST is empty or the file does not exist."
            echo "The 'Set up code signing' step likely failed. Check the logs above."
          fi

          echo ""
          echo "== Active code signing identities =="
          security find-identity -v -p codesigning || true

      - name: Install iOS pods
        script: |
          set -eo pipefail
          cd ios
          pod install --repo-update

      - name: Build iOS ipa
        script: |
          set -eo pipefail
          if [[ -z "$CM_EXPORT_OPTIONS_PLIST" ]]; then
            echo "ERROR: CM_EXPORT_OPTIONS_PLIST is not set."
            echo "This means 'xcode-project use-profiles' did not complete successfully."
            echo "Check the 'Set up code signing' step for errors."
            exit 1
          fi
          flutter build ipa --release --export-options-plist="$CM_EXPORT_OPTIONS_PLIST"
    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/iphoneos/Runner.app.dSYM.zip
      - /tmp/xcodebuild_logs/*.log
